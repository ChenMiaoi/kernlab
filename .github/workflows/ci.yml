name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-boot:
    name: Build Artifacts And QEMU Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install dependencies
        run: make -C ci install-deps

      - name: Run CI scripts
        run: |
          set -euo pipefail
          make -C ci ci ARCH=x86_64 JOBS="$(nproc)" CI_QEMU_TIMEOUT=120
